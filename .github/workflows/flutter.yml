name: Flutter Android Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Regenerate Android project
        run: |
          rm -rf android
          flutter create .

      - name: Force Kotlin 1.9.24
        run: |
          sed -i "s/id 'org.jetbrains.kotlin.android' version '[^']*'/id 'org.jetbrains.kotlin.android' version '1.9.24'/" android/settings.gradle
          grep "org.jetbrains.kotlin.android" android/settings.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: radio-mosaic-apk
          path: build/app/outputs/flutter-apk/app-release.apk
